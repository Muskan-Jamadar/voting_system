<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Candidate</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        .content { margin-left: 250px; padding: 30px; }
        .card { border-radius: 15px; }
    </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: sidebar}"></div>

<div class="content">

    <div class="card shadow p-4 mx-auto" style="max-width:700px;">

        <h3>Add Candidate</h3>

        <div th:if="${param.added}" class="alert alert-success">
            ✅ Candidate added successfully!
        </div>

        <!-- ✅ IMPORTANT FIX -->
        <form action="/admin/add-candidate" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Party</label>
                <input type="text" name="party" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Election Type</label>
                <select name="electionType" class="form-control">
                    <option value="Lok Sabha">Lok Sabha</option>
                    <option value="State">State</option>
                </select>
            </div>

            <div class="mb-3">
                <label>State</label>
                <input type="text" name="state" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Party Logo</label>
                <!-- ✅ NAME MUST MATCH CONTROLLER -->
                <input type="text" name="logoFileName" placeholder="Enter logo name like bjp.png">
            </div>

            <button class="btn btn-primary w-100">Add Candidate</button>

        </form>

    </div>

</div>

</body>
</html>
