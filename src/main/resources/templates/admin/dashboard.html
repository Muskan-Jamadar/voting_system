<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background:#f4f6f9; }
        .sidebar { width:250px; min-height:100vh; }
        .sidebar a { display:block; padding:12px; color:white; text-decoration:none; border-radius:10px; margin-bottom:8px; }
        .sidebar a:hover { background:rgba(255,255,255,0.15); }
        .card { border:none; border-radius:20px; transition:.3s; }
        .card:hover { transform:translateY(-8px); }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar bg-dark p-4">
        <h3 class="text-white text-center mb-4">Admin Panel</h3>

        <a href="/admin"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/admin/candidates"><i class="bi bi-people"></i> Candidates</a>
        <a href="/admin/add-candidate"><i class="bi bi-person-plus"></i> Add Candidate</a>
        <a href="/admin/election-settings"><i class="bi bi-gear"></i> Elections</a>
        <a href="/admin/users"><i class="bi bi-person-badge"></i> Users</a>
        <a href="/admin/analytics"><i class="bi bi-bar-chart"></i> Analytics</a>
        <a href="/logout" class="text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-grow-1 p-5">

        <h1 class="mb-4">Welcome Admin</h1>

        <!-- CARDS -->
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card bg-primary text-white shadow p-4 text-center">
                    <h2 th:text="${totalCandidates}"></h2>
                    <p>Total Candidates</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-success text-white shadow p-4 text-center">
                    <h2 th:text="${totalUsers}"></h2>
                    <p>Total Users</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-warning text-dark shadow p-4 text-center">
                    <h2 th:text="${totalVotes}"></h2>
                    <p>Total Votes</p>
                </div>
            </div>
        </div>

        <!-- ✅ LOGS SECTION -->
        <hr class="my-5">

        <h4 class="mb-3">🧾 Recent Activity Logs</h4>

        <div class="card shadow-sm p-3">
            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>User</th>
                            <th>Action</th>
                            <th>Time</th>
                        </tr>
                    </thead>

                    <tbody>

                        <!-- No logs -->
                        <tr th:if="${logs == null or #lists.isEmpty(logs)}">
                            <td colspan="3" class="text-center text-muted">
                                No logs available
                            </td>
                        </tr>

                        <!-- Logs -->
                        <tr th:each="log : ${logs}">
                            <td th:text="${log.username}"></td>
                            <td th:text="${log.action}"></td>
                            <td th:text="${log.timestamp}"></td>
                        </tr>

                    </tbody>

                </table>

            </div>
        </div>

    </div>
</div>

</body>
</html>
