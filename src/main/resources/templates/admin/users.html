<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            width: 240px;
            position: fixed;
        }
        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
            border-radius: 8px;
        }
        .sidebar a:hover {
            background: #334155;
            color: white;
        }
        .content {
            margin-left: 250px;
            padding: 30px;
        }
        .table th {
            white-space: nowrap;
        }
        .badge {
            font-size: 0.8rem;
        }
        .search-box {
            position: relative;
        }
        .search-box i {
            position: absolute;
            top: 10px;
            left: 10px;
            color: gray;
        }
        .search-box input {
            padding-left: 35px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div th:replace="~{fragments/navbar :: sidebar}"></div>

<!-- Content -->
<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="bi bi-person"></i> Registered Users</h3>
    </div>

    <!-- Search -->
    <div class="search-box mb-3">
        <i class="bi bi-search"></i>
        <input type="text" class="form-control" placeholder="Search users...">
    </div>

    <!-- Table -->
    <div class="card shadow">
        <div class="card-body">

            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Username</th>
                        <th>State</th>
                        <th>Role</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.username}"></td>

                        <td>
                            <span class="badge bg-info text-dark" th:text="${u.state}"></span>
                        </td>

                        <td>
                            <span th:classappend="${u.role == 'ADMIN'} ? 'badge bg-danger' : 'badge bg-success'"
                                  th:text="${u.role}">
                            </span>
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
