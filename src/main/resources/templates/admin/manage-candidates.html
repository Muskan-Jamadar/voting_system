<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Candidates</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        .sidebar { height: 100vh; background: #1e293b; color: white; width: 240px; position: fixed; }
        .sidebar a { color: #cbd5e1; text-decoration: none; display: block; padding: 12px 20px; border-radius: 8px; }
        .sidebar a:hover { background: #334155; color: white; }
        .content { margin-left: 250px; padding: 30px; }
        .btn { border-radius: 8px; }
    </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: sidebar}"></div>

<div class="content">

    <div class="d-flex justify-content-between mb-4">
        <h3>Manage Candidates</h3>
        <a href="/admin/add-candidate" class="btn btn-primary">Add Candidate</a>
    </div>

    <!-- ✅ SUCCESS ALERTS -->
    <div th:if="${param.added}" class="alert alert-success">
        ✅ Candidate added successfully!
    </div>

    <div th:if="${param.updated}" class="alert alert-info">
        ✏️ Candidate updated successfully!
    </div>

    <div th:if="${param.deleted}" class="alert alert-danger">
        🗑 Candidate deleted successfully!
    </div>

    <!-- ✅ 🔥 SINGLE DYNAMIC ERROR MESSAGE -->
    <div th:if="${param.error}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle"></i>
        <span th:text="' Cannot ' + ${param.error[0]} + ' candidate while election is active!'"></span>
    </div>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>Logo</th>
                    <th>Party</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>State</th>
                    <th>Votes</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="c : ${candidates}">
                    <td>
                        <img th:src="@{'/images/' + ${c.partyLogo}}" width="45" height="45">
                    </td>
                    <td th:text="${c.party}"></td>
                    <td th:text="${c.name}"></td>
                    <td th:text="${c.electionType}"></td>
                    <td th:text="${c.state}"></td>
                    <td th:text="${voteCountMap[c.id]}"></td>

                    <td>
                        <a th:href="@{'/admin/edit-candidate/' + ${c.id}}"
                           class="btn btn-warning btn-sm">Edit</a>

                        <a th:href="@{'/admin/delete-candidate/' + ${c.id}}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure?')">
                            Delete
                        </a>
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
