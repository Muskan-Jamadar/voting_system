<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
            color: white;
        }

        .navbar-custom {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);
            padding: 15px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .navbar-brand {
            font-size: 1.6rem;
            font-weight: bold;
            color: white !important;
            text-decoration: none;
        }

        .hero-section {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .hero-card {
            background: rgba(255,255,255,0.12);
            border-radius: 25px;
            padding: 40px;
            max-width: 1000px;
            margin: auto;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .dashboard-title {
            font-size: 3rem;
            font-weight: bold;
        }

        .dashboard-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .feature-card {
            background: rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: 0.3s ease;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: 100%;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 40px rgba(0,0,0,0.35);
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .btn-modern {
            border-radius: 12px;
            font-weight: 600;
            padding: 10px 25px;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding-bottom: 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar-custom d-flex justify-content-between align-items-center">
    <a class="navbar-brand" href="#">
        <i class="fas fa-vote-yea me-2"></i>Voting System
    </a>

    <div>
        Welcome, <strong th:text="${username}"></strong>
    </div>
</nav>

<!-- HERO -->
<div class="hero-section">
    <div class="hero-card">
        <h1 class="dashboard-title">Citizen Dashboard</h1>
        <p class="dashboard-subtitle">Secure, transparent, and digital voting experience</p>
    </div>
</div>

<!-- MAIN CARDS -->
<div class="container pb-5">
    <div class="row g-4">

        <!-- Vote -->
        <div class="col-md-4">
            <div class="feature-card">
                <div class="feature-icon text-primary">
                    <i class="fas fa-check-to-slot"></i>
                </div>
                <h3>Vote</h3>
                <p>Cast your vote securely.</p>
                <a href="/vote" class="btn btn-primary btn-modern">Go Vote</a>
            </div>
        </div>

        <!-- Results -->
        <div class="col-md-4">
            <div class="feature-card">
                <div class="feature-icon text-success">
                    <i class="fas fa-chart-bar"></i>
                </div>
                <h3>Results</h3>
                <p>View live election results.</p>
                <a th:href="@{/result/{state}(state=${user.state},type=${electionType})}"
   class="btn btn-success btn-modern">

    View Results

</a>
            </div>
        </div>

        <!-- Logout -->
        <div class="col-md-4">
            <div class="feature-card">
                <div class="feature-icon text-danger">
                    <i class="fas fa-right-from-bracket"></i>
                </div>
                <h3>Logout</h3>
                <p>Exit safely.</p>
                <a href="/logout" class="btn btn-danger btn-modern">Logout</a>
            </div>
        </div>

        <!-- Admin -->
        <div class="col-md-12 mt-4 text-center"
             th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
            <a href="/admin" class="btn btn-warning btn-lg px-5">
                <i class="fas fa-user-shield me-2"></i>Open Admin Panel
            </a>
        </div>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Secure Online Voting Platform
</div>

</body>
</html>
