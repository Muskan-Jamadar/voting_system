<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Voter Registration | Online Voting System</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-container {
            width: 100%;
            max-width: 520px;
            padding: 20px;
        }

        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 35px;
        }

        .system-title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #1d4ed8;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .main-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: gray;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-control,
        .form-select {
            height: 52px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            padding-left: 15px;
            font-size: 15px;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 0.15rem rgba(37,99,235,0.25);
        }

        .btn-register {
            height: 52px;
            border-radius: 12px;
            background: linear-gradient(to right, #16a34a, #22c55e);
            border: none;
            font-weight: 600;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn-register:hover {
            transform: translateY(-2px);
        }

        .btn-otp {
            min-width: 120px;
            border-radius: 12px;
            font-weight: 600;
            background: #facc15;
            border: none;
        }

        .btn-otp:hover {
            background: #eab308;
        }

        .error-msg {
            text-align: center;
            color: red;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .login-link a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 600;
        }

        #timer {
            display: block;
            margin-top: 8px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="register-container">
    <div class="register-card">

        <div class="system-title">ONLINE VOTING SYSTEM</div>
        <h2 class="main-title">🗳 Voter Registration</h2>
        <p class="subtitle">Create your secure voter account</p>

        <p class="error-msg" th:if="${error}" th:text="${error}"></p>

        <form id="registerForm" th:action="@{/register}" method="post">

            <!-- Username -->
            <input type="text" name="username"
                   placeholder="Enter Username"
                   class="form-control mb-3" required>

            <!-- Password -->
            <input type="password" name="password"
                   placeholder="Create Password"
                   class="form-control mb-3" required>

            <!-- Voter ID -->
            <input type="text" name="voterId"
                   placeholder="Enter Voter ID"
                   class="form-control mb-3" required>

            <!-- DOB -->
            <input type="date" name="dob" id="dob"
                   class="form-control mb-3" required>

            <!-- AGE -->
            <input type="number" name="age" id="age"
                   class="form-control mb-3"
                   placeholder="Age"
                   readonly>

            <!-- EMAIL -->
            <input type="email" name="email" id="email"
                   class="form-control mb-3"
                   placeholder="Enter Email Address"
                   required>

            <!-- OTP -->
            <div class="d-flex mb-2">
                <input type="text" name="otp" id="otp"
                       class="form-control me-2"
                       placeholder="Enter OTP" required>

                <button type="button" id="otpBtn"
                        class="btn btn-otp"
                        onclick="sendOTP()">Send OTP</button>
            </div>

            <!-- TIMER -->
            <small id="timer" style="font-weight:600;"></small>
            <div class="text-center mt-2">
    <button type="button"
            id="resendBtn"
            class="btn btn-link"
            style="display:none; font-weight:600; color:#2563eb;"
            onclick="resendOTP()">
        🔄 Resend OTP
    </button>
</div>

            <!-- STATE -->
            <select name="state" class="form-select mt-3 mb-4" required>
                <option value="">Select Your State</option>
                <option>Tamil Nadu</option>
                <option>Karnataka</option>
                <option>Telangana</option>
                <option>Andhra Pradesh</option>
                <option>Maharashtra</option>
                <option>Delhi</option>
                <option>Uttar Pradesh</option>
            </select>

            <!-- REGISTER BUTTON -->
            <button type="submit" class="btn btn-register text-white w-100">
                Register Securely
            </button>

        </form>

        <div class="login-link">
            Already registered?
            <a th:href="@{/login}">Login Here</a>
        </div>

    </div>
</div>

<script>

// ✅ AUTO AGE CALCULATION + VALIDATION
document.getElementById("dob").addEventListener("change", function () {
    let dob = new Date(this.value);
    let today = new Date();

    let age = today.getFullYear() - dob.getFullYear();

    if (
        today.getMonth() < dob.getMonth() ||
        (today.getMonth() === dob.getMonth() && today.getDate() < dob.getDate())
    ) {
        age--;
    }

    document.getElementById("age").value = age;

    if (age < 18) {
        alert("❌ You must be 18+ to register!");
        this.value = "";
        document.getElementById("age").value = "";
    }
});

// ✅ OTP FUNCTION
let otpTimer = 60;
let interval;

function sendOTP() {

    let email = document.getElementById("email").value;
    let btn = document.getElementById("otpBtn");
    let timerText = document.getElementById("timer");

    if (!email) {
        showMessage("Enter email first", "red");
        return;
    }

    btn.disabled = true;

    fetch("/send-otp?email=" + email)
    .then(res => res.text())
    .then(msg => {

        showMessage(msg, "green");

        otpTimer = 60;
        timerText.innerHTML = "Resend OTP in 60s";

        interval = setInterval(() => {

            otpTimer--;
            timerText.innerHTML = "Resend OTP in " + otpTimer + "s";

            if (otpTimer <= 0) {
                clearInterval(interval);
                btn.disabled = false;
                timerText.innerHTML = "You can resend OTP";
            }

        }, 1000);

    })
    .catch(() => {
        showMessage("Error sending OTP", "red");
        btn.disabled = false;
    });
}

// 🔥 UI MESSAGE FUNCTION (NO ALERTS)
function showMessage(msg, color) {
    let timerText = document.getElementById("timer");
    timerText.innerHTML = msg;
    timerText.style.color = color;
}
//🔁 RESEND OTP FUNCTION (ADD ONLY - NO CHANGES ABOVE)
function resendOTP() {

    let email = document.getElementById("email").value;
    let btn = document.getElementById("resendBtn");
    let timerText = document.getElementById("timer");

    if (!email) {
        showMessage("Enter email first", "red");
        return;
    }

    fetch("/send-otp?email=" + email)
    .then(res => res.text())
    .then(msg => {

        showMessage("New OTP sent successfully", "green");

        otpTimer = 60;

        btn.style.display = "none"; // hide resend again

        timerText.innerHTML = "Resend OTP in 60s";

        clearInterval(interval);

        interval = setInterval(() => {

            otpTimer--;
            timerText.innerHTML = "Resend OTP in " + otpTimer + "s";

            if (otpTimer <= 0) {
                clearInterval(interval);

                timerText.innerHTML = "OTP expired. You can resend now.";

                btn.style.display = "inline-block"; // show resend button
            }

        }, 1000);

    })
    .catch(() => {
        showMessage("Failed to resend OTP", "red");
    });
}

</script>

</body>
</html>
