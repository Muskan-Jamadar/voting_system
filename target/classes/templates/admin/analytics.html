<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Analytics</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            width: 240px;
            position: fixed;
        }
        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
            border-radius: 8px;
        }
        .sidebar a:hover {
            background: #334155;
            color: white;
        }
        .content {
            margin-left: 250px;
            padding: 30px;
        }
        .card {
            border-radius: 15px;
        }
        .stat-card {
            text-align: center;
            padding: 20px;
        }
        .stat-card h3 {
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div th:replace="~{fragments/navbar :: sidebar}"></div>

<!-- Content -->
<div class="content">

    <h3 class="mb-4"><i class="bi bi-bar-chart"></i> Voting Analytics</h3>

    <!-- Stats Cards -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card shadow stat-card">
                <h6>Total Candidates</h6>
                <h3 th:text="${names.size()}"></h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow stat-card">
                <h6>Total Votes</h6>
                <h3 th:text="${totalVotes}"></h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow stat-card">
                <h6>Parties</h6>
                <h3 th:text="${partyVotes.size()}"></h3>
            </div>
        </div>
    </div>

    <!-- Party Table -->
    <div class="card shadow p-4 mb-4">
        <h5><i class="bi bi-diagram-3"></i> Party Wise Votes</h5>
        <table class="table table-hover mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Party</th>
                    <th>Total Votes</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${partyVotes}">
                    <td>
                        <span class="badge bg-secondary" th:text="${entry.key}"></span>
                    </td>
                    <td>
                        <span class="badge bg-success" th:text="${entry.value}"></span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Chart -->
    <div class="card shadow p-4">
        <h5><i class="bi bi-bar-chart-line"></i> Candidate Voting Chart</h5>
        <canvas id="voteChart"></canvas>
    </div>

</div>

<script th:inline="javascript">
    var names = /*[[${names}]]*/ [];
    var votes = /*[[${votes}]]*/ [];

    new Chart(document.getElementById('voteChart'), {
        type: 'bar',
        data: {
            labels: names,
            datasets: [{
                label: 'Votes',
                data: votes,
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true
                }
            }
        }
    });
</script>

</body>
</html>
