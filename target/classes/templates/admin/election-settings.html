<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Election Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        .sidebar { height: 100vh; background: #1e293b; color: white; width: 240px; position: fixed; }
        .sidebar a { color: #cbd5e1; text-decoration: none; display: block; padding: 12px 20px; border-radius: 8px; }
        .sidebar a:hover { background: #334155; color: white; }
        .content { margin-left: 250px; padding: 30px; }
        .card { border-radius: 15px; }
        .form-control { border-radius: 10px; }
        .btn { border-radius: 10px; }
        .header { font-weight: 600; }
    </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: sidebar}"></div>

<div class="content">

    <h3 class="mb-4 header">
        <i class="bi bi-gear"></i> Election Settings
    </h3>

    <!-- ALERTS -->
    <div th:if="${param.success != null and param.success[0] == 'active'}"
         class="alert alert-success">
        ✅ Active election set successfully!
    </div>

    <div th:if="${param.success != null and param.success[0] == 'time'}"
         class="alert alert-warning">
        ⏰ Election time updated successfully!
    </div>

    <!-- ACTIVE ELECTION -->
    <div class="card shadow p-4 mb-4">
        <h5>Set Active Election</h5>

        <form action="/admin/set-active-election" method="post">
            <select name="type" class="form-control mb-3">
                <option value="Lok Sabha">Lok Sabha</option>
                <option value="State">State</option>
            </select>

            <button class="btn btn-success w-100">
                Set Active
            </button>
        </form>
    </div>

    <!-- TIME -->
    <div class="card shadow p-4 mb-4">
        <h5>Set Election Time</h5>

        <form action="/admin/set-election-time" method="post">

            <select name="type" class="form-control mb-3">
                <option value="Lok Sabha">Lok Sabha</option>
                <option value="State">State</option>
            </select>

            <div class="row">
                <div class="col-md-6">
                    <input type="number" name="hours" class="form-control mb-3" placeholder="Hours">
                </div>

                <div class="col-md-6">
                    <input type="number" name="minutes" class="form-control mb-3" placeholder="Minutes">
                </div>
            </div>

            <input type="datetime-local" name="endTime" class="form-control mb-3">

            <button class="btn btn-warning w-100">
                Set Time
            </button>

        </form>
    </div>

    <!-- 🚨 END ELECTION (NEW SECTION) -->
    <div class="card shadow p-4 mt-4 border-danger">

        <h5 class="text-danger">
            <i class="bi bi-stop-circle"></i> End Election
        </h5>

        <p class="text-muted">
            This will immediately stop voting and mark the election as finished.
        </p>

        <form action="/admin/end-election" method="post"
              onsubmit="return confirm('Are you sure you want to end the election?');">

            <button class="btn btn-danger w-100">
                End Election Now
            </button>

        </form>

    </div>

</div>
<!-- 🚨 END ELECTION POPUP -->
<div id="endPopup"
     style="display:none;
            position:fixed;
            top:0;left:0;
            width:100%;height:100%;
            background:rgba(0,0,0,0.6);
            align-items:center;
            justify-content:center;
            z-index:9999;">

    <div style="background:white;
                padding:40px;
                border-radius:15px;
                text-align:center;
                width:300px;">

        <h3 style="color:red;">🚨 Election Ended</h3>
        <p>Voting has been stopped successfully.</p>

        <button class="btn btn-success mt-3" onclick="closePopup()">
            OK
        </button>
    </div>
</div>

<script th:if="${electionEnded}">
    document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("endPopup").style.display = "flex";
    });

    function closePopup() {
        document.getElementById("endPopup").style.display = "none";
    }
</script>

</body>
</html>
